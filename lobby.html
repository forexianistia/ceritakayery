<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KayCerita Lobby</title>

<style>

:root{
--bg:#f5f5f5;
--card:#ffffff;
--sidebar:#e5e5e5;
--text:#111111;
--accent:#3b82f6;
--success:#22c55e;
--danger:#ef4444;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;

background:
linear-gradient(
135deg,
rgba(255,255,255,1),
rgba(200,200,200,.75),
rgba(0,0,0,.35)
);

color:var(--text);
overflow:hidden;
}

.sidebar{
width:280px;
background:rgba(255,255,255,.7);
backdrop-filter:blur(10px);
padding:20px;
border-right:1px solid rgba(0,0,0,.1);
display:flex;
flex-direction:column;
}

.logo{
font-size:28px;
font-weight:800;
margin-bottom:20px;
}

.search{
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
}

.menu-list{
flex:1;
overflow:auto;
}

.story{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.story:hover{
transform:translateX(5px);
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.welcome{
text-align:center;
margin-bottom:25px;
}

.welcome h1{
font-size:60px;
font-weight:900;
}

.welcome p{
opacity:.7;
margin-top:10px;
}

.title{
width:100%;
padding:15px;
font-size:26px;
border:none;
border-radius:12px;
margin-bottom:15px;
}

.editor{
width:100%;
height:50vh;
padding:15px;
border:none;
border-radius:12px;
resize:none;
font-size:16px;
}

.toolbar{
display:flex;
gap:10px;
margin-top:15px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.save{
background:var(--success);
color:white;
}

.delete{
background:var(--danger);
color:white;
}

.add{
background:var(--accent);
color:white;
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">📖 KayCerita</div>

<input
class="search"
placeholder="Cari cerita..."
oninput="searchStory(this.value)"

>

<div id="menuList" class="menu-list"></div>

<button class="add" onclick="addStory()">
+ Tambah Cerita
</button>

</div>

<div class="main">

<div class="welcome">
<h1>KayCerita</h1>
<p>Bangun dunia dan simpan setiap kisahmu.</p>
</div>

<input
id="title"
class="title"
placeholder="Judul Cerita..."

>

<textarea
id="content"
class="editor"
placeholder="Mulai menulis..."
></textarea>

<div class="toolbar">

<button class="save" onclick="saveStory()">
💾 Simpan
</button>

<button class="delete" onclick="deleteStory()">
🗑 Hapus
</button>

</div>

</div>

<script>

let stories =
JSON.parse(localStorage.getItem("stories")) || [];

let currentIndex = null;

function saveStorage(){
localStorage.setItem(
"stories",
JSON.stringify(stories)
);
}

function renderStories(list = stories){

const menu =
document.getElementById("menuList");

menu.innerHTML="";

list.forEach((story)=>{

const div =
document.createElement("div");

div.className="story";

div.innerHTML=
"<strong>"+story.title+"</strong>";

div.onclick=()=>{

currentIndex=
stories.indexOf(story);

loadStory(currentIndex);

};

menu.appendChild(div);

});

}

function addStory(){

stories.push({
title:"Cerita Baru",
content:""
});

saveStorage();
renderStories();

loadStory(stories.length-1);

}

function loadStory(index){

currentIndex=index;

document.getElementById("title").value=
stories[index].title;

document.getElementById("content").value=
stories[index].content;

}

function saveStory(){

if(currentIndex===null) return;

stories[currentIndex].title=
document.getElementById("title").value;

stories[currentIndex].content=
document.getElementById("content").value;

saveStorage();
renderStories();

alert("Tersimpan");
}

function deleteStory(){

if(currentIndex===null) return;

stories.splice(currentIndex,1);

saveStorage();
renderStories();

document.getElementById("title").value="";
document.getElementById("content").value="";

currentIndex=null;

}

function searchStory(keyword){

const result=
stories.filter(s=>

s.title.toLowerCase()
.includes(keyword.toLowerCase())

);

renderStories(result);

}

renderStories();

</script>

</body>
</html>
