<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKO ROBUX PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
}

.header{
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:700;

    background:linear-gradient(90deg,#ff4d4d,#facc15,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 25px rgba(255,0,0,0.7);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.input-box{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.card{
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px red;
}

.card.active{
    border:2px solid #22c55e;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ff4d4d,#ff0000);
    color:white;
    font-weight:600;
    cursor:pointer;
}

.payment{
    display:none;
    margin-top:20px;
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="header">🚀 TOKO ROBUX 🚀</div>

<div class="container">

<div class="input-box">
<input type="text" id="userid" placeholder="Masukkan User ID Roblox">
</div>

<h3>Pilih Paket</h3>

<div class="grid">

<div class="card" onclick="pilih(this,'100 Robux',10000)">◘ 100<br>Rp10K</div>
<div class="card" onclick="pilih(this,'300 Robux',30000)">◘ 300<br>Rp30K</div>
<div class="card" onclick="pilih(this,'500 Robux',50000)">◘ 500<br>Rp50K</div>
<div class="card" onclick="pilih(this,'1000 Robux',100000)">◘ 1000<br>Rp100K</div>
<div class="card" onclick="pilih(this,'1500 Robux',150000)">◘ 1500<br>Rp150K</div>

</div>

<button onclick="lanjut()">Lanjut Pembayaran</button>

<div class="payment" id="payBox">

<h3>Pilih Pembayaran</h3>

<select id="metode">
<option value="">-- Pilih --</option>
<option>QRIS</option>
<option>DANA</option>
<option>OVO</option>
</select>

<button onclick="kirim()">Kirim Order</button>

</div>

</div>

<script>

/* =========================
   🔥 GANTI INI DENGAN WEBHOOK KAMU
========================= */
const WEBHOOK_URL = "https://discord.com/api/webhooks/1501612323117338797/cqKIFk3cH2EJizaOqBk_FCqVKUhGXvS3o34YMKhpASmWRie3IyIgXnRifA-8U8pELCHh";

/* ========================= */

let paket="", harga=0;

function pilih(el,nama,h){
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
    el.classList.add("active");
    paket=nama;
    harga=h;
}

function lanjut(){
    if(!userid.value || !paket){
        alert("Isi data dulu!");
        return;
    }
    payBox.style.display="block";
}

/* =========================
   🔥 KIRIM KE DISCORD
========================= */
function kirimDiscord(user, paket, harga, metode){
    const data = {
        content: "🔥 ORDER MASUK!",
        embeds: [
            {
                title: "💎 TOKO ROBUX",
                color: 16711680,
                fields: [
                    { name: "👤 User ID", value: user },
                    { name: "📦 Paket", value: paket },
                    { name: "💰 Harga", value: "Rp" + harga },
                    { name: "💳 Metode", value: metode }
                ],
                timestamp: new Date()
            }
        ]
    };

    fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    }).catch(err => console.log(err));
}

/* ========================= */

function kirim(){
    let metode=document.getElementById("metode").value;
    if(!metode){
        alert("Pilih pembayaran!");
        return;
    }

    let user = userid.value;

    // 🔥 KIRIM DISCORD
    kirimDiscord(user, paket, harga, metode);

    // 🔥 KIRIM WA
    let pesan=`Halo saya ingin beli robux

User ID: ${user}
Paket: ${paket}
Harga: Rp${harga}
Metode: ${metode}`;

    window.open("https://wa.me/6287733313467?text="+encodeURIComponent(pesan));
}

</script>

</body>
</html>
