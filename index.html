<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKO ROBUX PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    overflow-x:hidden;
}

/* ===== HEADER ===== */
.header{
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;

    background:linear-gradient(90deg,#ff4d4d,#facc15,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 25px rgba(255,0,0,0.7);
}

/* ===== CONTAINER ===== */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* ===== INPUT ===== */
.input-box{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    backdrop-filter:blur(10px);
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
}

/* ===== PRODUK GRID ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.card{
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    border:1px solid transparent;
}

.card:hover{
    transform:translateY(-5px) scale(1.05);
    border:1px solid #ff4d4d;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.card.active{
    border:2px solid #22c55e;
    box-shadow:0 0 20px #22c55e;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ff4d4d,#ff0000);
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px red;
}

/* ===== PAYMENT ===== */
.payment{
    display:none;
    margin-top:20px;
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
}

/* ===== FLOATING EMOJI ===== */
.emoji span{
    position:absolute;
    animation:float 12s linear infinite;
    opacity:0.6;
}

@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

</style>

</head>

<body>

<div class="header">🚀 TOKO ROBUX 🚀</div>

<div class="container">

<div class="input-box">
<input type="text" id="userid" placeholder="Masukkan User ID Roblox">
</div>

<h3>Pilih Paket</h3>

<div class="grid" id="produkList">

<div class="card" onclick="pilih(this,'100 Robux',10000)">💎 100<br>Rp10K</div>
<div class="card" onclick="pilih(this,'300 Robux',30000)">💎 300<br>Rp30K</div>
<div class="card" onclick="pilih(this,'500 Robux',50000)">💎 500<br>Rp50K</div>
<div class="card" onclick="pilih(this,'1000 Robux',100000)">🔥 1000<br>Rp100K</div>
<div class="card" onclick="pilih(this,'1500 Robux',150000)">🚀 1500<br>Rp150K</div>

</div>

<button onclick="lanjut()">Lanjut Pembayaran</button>

<div class="payment" id="payBox">

<h3>Pilih Pembayaran</h3>

<select id="metode">
<option value="">-- Pilih --</option>
<option>QRIS</option>
<option>DANA</option>
<option>OVO</option>
</select>

<button onclick="kirim()">Kirim ke WhatsApp</button>

</div>

</div>

<!-- EMOJI -->

<div class="emoji">
<span style="left:10%">💎</span>
<span style="left:30%">🔥</span>
<span style="left:60%">🚀</span>
<span style="left:80%">✨</span>
</div>

<script>

let paket="", harga=0;

function pilih(el,nama,h){
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
    el.classList.add("active");
    paket=nama;
    harga=h;
}

function lanjut(){
    if(!userid.value || !paket){
        alert("Isi data dulu!");
        return;
    }
    payBox.style.display="block";
}

function kirim(){
    let metode=document.getElementById("metode").value;
    if(!metode){
        alert("Pilih pembayaran!");
        return;
    }

    let pesan=`Halo saya ingin beli robux

User ID: ${userid.value}
Paket: ${paket}
Harga: Rp${harga}
Metode: ${metode}`;

    window.open("https://wa.me/6287733313467?text="+encodeURIComponent(pesan));
}

</script>

</body>
</html>
