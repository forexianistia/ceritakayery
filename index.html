<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KayCerita</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
linear-gradient(
135deg,
rgba(255,255,255,1),
rgba(200,200,200,0.75),
rgba(0,0,0,0.35)
);
}

body::before{
content:"";
position:absolute;
inset:0;
backdrop-filter:blur(8px);
}

.hero{
position:relative;
z-index:2;
text-align:center;
padding:40px;
}

.hero h1{
font-size:90px;
font-weight:900;
color:white;

text-shadow:
0 0 10px rgba(0,0,0,.2),
0 0 30px rgba(0,0,0,.3),
0 0 50px rgba(0,0,0,.3);
}

.hero p{
margin-top:15px;
font-size:20px;
color:white;
opacity:.9;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 40px;

background:white;
color:#111;

text-decoration:none;
font-weight:700;

border-radius:50px;

transition:.3s;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.footer{
position:absolute;
bottom:20px;
left:0;
right:0;
text-align:center;
color:white;
opacity:.6;
font-size:14px;
}

@media(max-width:768px){

.hero h1{
font-size:60px;
}

.hero p{
font-size:16px;
}

}

</style>

</head>
<body>

<div class="hero">

<h1>KayCerita</h1>

<p>
Tempat menyimpan dunia, karakter,
dan semua kisahmu.
</p>

<a href="lobby.html" class="btn">
Masuk ke Lobby
</a>

</div>

<div class="footer">
© KayCerita
</div>

</body>
</html>
