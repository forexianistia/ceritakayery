<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

    addDoc,
    onSnapshot,

from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

window.addEventListener("DOMContentLoaded",()=>{

/* FIREBASE CONFIG */

const firebaseConfig = {

    apiKey: "AIzaSyALuiOK0XIrbGtaUnnFsTvpYnTwxqi2Rsg",

    authDomain: "trading-journal-32050.firebaseapp.com",

    projectId: "trading-journal-32050",

    storageBucket: "trading-journal-32050.firebasestorage.app",

    messagingSenderId: "435004813714",

    appId: "1:435004813714:web:219feac13109bf3b3e514b",

    measurementId: "G-0RBVJ7CZ9Y"
};

/* INIT */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* DISCORD WEBHOOK */

const WEBHOOK_URL = "https://discord.com/api/webhooks/1501612323117338797/cqKIFk3cH2EJizaOqBk_FCqVKUhGXvS3o34YMKhpASmWRie3IyIgXnRifA-8U8pELCHh";

/* DATA */

let paket = "";
let harga = 0;

/* PILIH PAKET */

function pilih(el,nama,h){

    document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
    });

    el.classList.add("active");

    paket = nama;
    harga = h;
}

window.pilih = pilih;

/* LANJUT */

function lanjut(){

    let user = document.getElementById("userid").value;

    if(!user || !paket){

        alert("Isi data dulu!");
        return;
    }

    document.getElementById("payBox").style.display = "block";
}

window.lanjut = lanjut;

/* PAYMENT */

function showPayment(){

    let metode = document.getElementById("metode").value;

    document.getElementById("qrisBox").style.display = "none";
    document.getElementById("ewalletBox").style.display = "none";

    if(metode === "QRIS"){

        document.getElementById("qrisBox").style.display = "block";
    }

    if(metode === "DANA" || metode === "OVO"){

        document.getElementById("ewalletBox").style.display = "block";
    }
}

window.showPayment = showPayment;

/* SIMPAN ORDER */

async function simpanOrder(user,nohp,paket,harga,metode){

    try{

        await addDoc(collection(db,"orders"),{

            user:user,
            nohp:nohp,
            paket:paket,
            harga:harga,
            metode:metode,
            status:"Menunggu Proses",
            createdAt:serverTimestamp()

        });

        console.log("Order berhasil disimpan");

    }catch(error){

        console.log("Firestore Error:",error);
    }
}

/* DISCORD */

function kirimDiscord(user,nohp,paket,harga,metode){

    fetch(WEBHOOK_URL,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            content:"🔥 ORDER MASUK!",

            embeds:[{

                title:"💎 TOKO ROBUX",

                description:"🛒 Pesanan baru berhasil masuk",

                color:5763719,

                thumbnail:{
                    url:"https://i.imgur.com/cDaQCNP.jpeg"
                },

                fields:[

                    {
                        name:"📌 Status",
                        value:"🟡 Menunggu Proses"
                    },

                    {
                        name:"👤 User ID",
                        value:user,
                        inline:true
                    },

                    {
                        name:"📱 No HP",
                        value:nohp,
                        inline:true
                    },

                    {
                        name:"🎮 Paket",
                        value:paket,
                        inline:true
                    },

                    {
                        name:"💰 Harga",
                        value:"Rp"+harga,
                        inline:true
                    },

                    {
                        name:"💳 Metode",
                        value:metode,
                        inline:true
                    }

                ],

                footer:{
                    text:"TOKO ROBUX PRO • AUTO ORDER"
                },

                timestamp:new Date()

            }]
        })
    });
}

/* CHAT ADMIN */

async function kirim(){

    let metode = document.getElementById("metode").value;

    let user = document.getElementById("userid").value;

    let nohp = document.getElementById("nohp").value;

    if(!metode || !nohp){

        alert("Lengkapi data!");
        return;
    }

    await simpanOrder(user,nohp,paket,harga,metode);

User ID: ${user}
No HP: ${nohp}
Paket: ${paket}
Harga: Rp${harga}
Metode: ${metode}`;

    window.open(
        "https://wa.me/6287733313467?text="+encodeURIComponent(pesan)
    );
}

window.kirim = kirim;

/* KONFIRMASI QRIS */

async function konfirmasiQRIS(){

    let user = document.getElementById("userid").value;

    let nohp = document.getElementById("nohp").value;

    await simpanOrder(user,nohp,paket,harga,"QRIS");

    kirimDiscord(user,nohp,paket,harga,"QRIS");

    let pesan = `Halo admin saya sudah bayar QRIS

User ID: ${user}
No HP: ${nohp}
Paket: ${paket}
Harga: Rp${harga}

Mohon segera diproses 🙏`;

    window.open(
        "https://wa.me/6287733313467?text="+encodeURIComponent(pesan)
    );
}

window.konfirmasiQRIS = konfirmasiQRIS;

/* PARTICLE */

const canvas = document.getElementById("bgCanvas");

if(canvas){

const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;

canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){

    particles.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()*0.5

    });
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        p.y -= p.speed;

        if(p.y < 0){

            p.y = canvas.height;
            p.x = Math.random()*canvas.width;
        }

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );

        ctx.fillStyle = "rgba(255,255,255,0.7)";

        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

}

/* REALTIME */

try{

    onSnapshot(collection(db,"orders"),(snapshot)=>{

        console.log("Realtime aktif");

        snapshot.docChanges().forEach((change)=>{

            if(change.type === "added"){

                console.log("Order baru:",change.doc.data());
            }
        });
    });

}catch(error){

    console.log("Realtime Error:",error);
}

});
</script>
