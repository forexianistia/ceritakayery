<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKO ROBUX PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;

    background:linear-gradient(270deg,#0f0c29,#302b63,#24243e,#0f0c29);
    background-size:600% 600%;
    animation:bgGerak 15s ease infinite;
}

/* BACKGROUND GERAK */
@keyframes bgGerak{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* CANVAS */
#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.header{
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:700;

    background:linear-gradient(90deg,#ff4d4d,#facc15,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 25px rgba(255,0,0,0.7);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.input-box{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    backdrop-filter:blur(10px);
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.card{
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px red;
}

.card.active{
    border:2px solid #22c55e;
    box-shadow:0 0 20px #22c55e;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ff4d4d,#ff0000);
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.payment{
    display:none;
    margin-top:20px;
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
}

/* EMOJI BUBBLE */
.emoji span{
    position:fixed;
    bottom:-50px;
    font-size:22px;
    opacity:0.7;
    animation:naik 12s linear infinite;
    filter:drop-shadow(0 0 10px #fff);
}

.emoji span:nth-child(1){left:10%;}
.emoji span:nth-child(2){left:25%;}
.emoji span:nth-child(3){left:45%;}
.emoji span:nth-child(4){left:65%;}
.emoji span:nth-child(5){left:80%;}
.emoji span:nth-child(6){left:90%;}

@keyframes naik{
    0%{transform:translateY(0) rotate(0); opacity:0;}
    20%{opacity:0.8;}
    100%{transform:translateY(-120vh) rotate(360deg); opacity:0;}
}
</style>

</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="header">🚀 TOKO ROBUX 🚀</div>

<div class="container">

<div class="input-box">
<input type="text" id="userid" placeholder="Masukkan User ID Roblox">
<input type="text" id="nohp" placeholder="Masukkan Nomor WhatsApp (08xxx)">
</div>

<h3>Pilih Paket</h3>

<div class="grid">
<div class="card" onclick="pilih(this,'100 Robux',10000)">◘ 100<br>Rp10K</div>
<div class="card" onclick="pilih(this,'300 Robux',30000)">◘ 300<br>Rp30K</div>
<div class="card" onclick="pilih(this,'500 Robux',50000)">◘ 500<br>Rp50K</div>
<div class="card" onclick="pilih(this,'1000 Robux',100000)">◘ 1000<br>Rp100K</div>
<div class="card" onclick="pilih(this,'1500 Robux',150000)">◘ 1500<br>Rp150K</div>
</div>

<button onclick="lanjut()">Lanjut Pembayaran</button>

<div class="payment" id="payBox">
<h3>Pilih Pembayaran</h3>

<select id="metode">
<option value="">-- Pilih --</option>
<option>QRIS</option>
<option>DANA</option>
<option>OVO</option>
</select>

<button onclick="kirim()">Kirim Order</button>

</div>

</div>

<!-- EMOJI -->

<div class="emoji">
<span>💎</span>
<span>🔥</span>
<span>🚀</span>
<span>✨</span>
<span>🎮</span>
<span>💰</span>
</div>

<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1501612323117338797/cqKIFk3cH2EJizaOqBk_FCqVKUhGXvS3o34YMKhpASmWRie3IyIgXnRifA-8U8pELCHh";

/* DATA */
let paket="", harga=0;

function pilih(el,nama,h){
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
    el.classList.add("active");
    paket=nama;
    harga=h;
}

function lanjut(){
    if(!userid.value || !paket){
        alert("Isi data dulu!");
        return;
    }
    payBox.style.display="block";
}

/* DISCORD */
function kirimDiscord(user, nohp, paket, harga, metode){
    fetch(WEBHOOK_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            content:"🔥 ORDER MASUK!",
            embeds:[{
                title:"💎 TOKO ROBUX",
                color:16711680,
                fields:[
                    {name:"User ID",value:user},
                    {name:"No HP",value:nohp},
                    {name:"Paket",value:paket},
                    {name:"Harga",value:"Rp"+harga},
                    {name:"Metode",value:metode}
                ],
                timestamp:new Date()
            }]
        })
    });
}

function kirim(){
    let metode=document.getElementById("metode").value;
    let user=userid.value;
    let nohp=document.getElementById("nohp").value;

    if(!metode || !nohp){
        alert("Lengkapi data!");
        return;
    }

    kirimDiscord(user,nohp,paket,harga,metode);

    let pesan=`Halo saya ingin beli robux

User ID: ${user}
No HP: ${nohp}
Paket: ${paket}
Harga: Rp${harga}
Metode: ${metode}`;

    window.open("https://wa.me/6287733313467?text="+encodeURIComponent(pesan));
}

/* PARTICLE */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.y-=p.speed;
        if(p.y<0){
            p.y=canvas.height;
            p.x=Math.random()*canvas.width;
        }

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,0.7)";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>

</body>
</html>
