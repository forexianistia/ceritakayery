<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKO ROBUX PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;
    background:linear-gradient(270deg,#0f0c29,#302b63,#24243e,#0f0c29);
    background-size:600% 600%;
    animation:bgGerak 15s ease infinite;
}

@keyframes bgGerak{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.header{
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:700;
    background:linear-gradient(90deg,#ff4d4d,#facc15,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.input-box{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    backdrop-filter:blur(10px);
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.card{
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px red;
}

.card.active{
    border:2px solid #22c55e;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ff4d4d,#ff0000);
    color:white;
    font-weight:600;
    cursor:pointer;
}

.payment{
    display:none;
    margin-top:20px;
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:15px;
}

.note-box{
    margin-top:12px;
    padding:12px;
    border-radius:12px;
    background:rgba(0,0,0,0.6);
}

.note-item{
    font-size:13px;
    padding:6px;
    margin:4px 0;
    border-radius:8px;
    background:rgba(255,255,255,0.05);
    text-align:center;
    color:#facc15;
}

.emoji span{
    position:fixed;
    bottom:-50px;
    font-size:22px;
    opacity:0.7;
    animation:naik 12s linear infinite;
}

.emoji span:nth-child(1){left:10%;}
.emoji span:nth-child(2){left:25%;}
.emoji span:nth-child(3){left:45%;}
.emoji span:nth-child(4){left:65%;}
.emoji span:nth-child(5){left:80%;}
.emoji span:nth-child(6){left:90%;}

@keyframes naik{
    0%{transform:translateY(0);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-120vh);opacity:0;}
}

</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="header">🚀 TOKO ROBUX 🚀</div>

<div class="container">

<div class="input-box">
<input type="text" id="userid" placeholder="Masukkan Username Roblox">
<input type="text" id="nohp" placeholder="Masukkan Nomor WhatsApp">
</div>

<h3>Pilih Paket</h3>

<div class="grid">
<div class="card" onclick="pilih(this,'100 Robux',12000)">100 - 12K</div>
<div class="card" onclick="pilih(this,'300 Robux',36000)">300 - 36K</div>
<div class="card" onclick="pilih(this,'500 Robux',60000)">500 - 60K</div>
<div class="card" onclick="pilih(this,'1000 Robux',120000)">1000 - 120K</div>
<div class="card" onclick="pilih(this,'1500 Robux',180000)">1500 - 180K</div>
</div>

<button onclick="lanjut()">Lanjut Pembayaran</button>

<div class="payment" id="payBox">

<h3>Pilih Pembayaran</h3>

<select id="metode" onchange="showPayment()">
<option value="">-- Pilih --</option>
<option value="QRIS">QRIS</option>
<option value="DANA">DANA</option>
<option value="OVO">OVO</option>
</select>

<div id="qrisBox" style="display:none;text-align:center;margin-top:15px;">
<img src="https://i.imgur.com/cDaQCNP.jpeg" style="width:250px;border-radius:15px;">
<button onclick="konfirmasiQRIS()">✔ Saya Sudah Bayar</button>
</div>

<div id="ewalletBox" style="display:none;margin-top:15px;">
<button onclick="kirim()">💬 Chat Admin</button>
</div>

</div>

<div class="note-box">
<div class="note-item">⚡ Proses cepat</div>
<div class="note-item">💎 Robux instant</div>
<div class="note-item">🔒 Aman</div>
</div>

</div>

<div class="emoji">
<span>💎</span><span>🔥</span><span>🚀</span><span>✨</span><span>🎮</span><span>💰</span>
</div>

<script>

const WEBHOOK_URL = "ISI_WEBHOOK_KAMU";

let paket="", harga=0;

/* AMBIL AVATAR ROBLOX */
async function getAvatar(username){
    try{
        const r = await fetch("https://users.roblox.com/v1/usernames/users",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({usernames:[username]})
        });

        const d = await r.json();
        const id = d.data?.[0]?.id;

        if(!id) return "https://tr.rbxcdn.com/default-avatar.png";

        return `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=420x420&format=Png`;
    }catch{
        return "https://tr.rbxcdn.com/default-avatar.png";
    }
}

function pilih(el,nama,h){
document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
paket=nama;harga=h;
}

function lanjut(){
if(!paket)return alert("Pilih paket!");
payBox.style.display="block";
}

function showPayment(){
let m=metode.value;
qrisBox.style.display=m==="QRIS"?"block":"none";
ewalletBox.style.display=(m==="DANA"||m==="OVO")?"block":"none";
}

/* DISCORD */
async function kirimDiscord(user,nohp,metode){

let avatar = await getAvatar(user);

fetch(WEBHOOK_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:"🔥 ORDER MASUK!",
embeds:[{
title:"TOKO ROBUX",
thumbnail:{url:avatar},
image:{url:avatar},
fields:[
{name:"User",value:user},
{name:"No HP",value:nohp},
{name:"Paket",value:paket},
{name:"Harga",value:"Rp"+harga},
{name:"Metode",value:metode}
]
}]
})
});

}

async function kirim(){
let u=userid.value,n=nohp.value,m=metode.value;
await kirimDiscord(u,n,m);
window.open("https://wa.me/6287733313467");
}

async function konfirmasiQRIS(){
await kirim();
}

/* ANIMASI */
const c=bgCanvas.getContext("2d");
bgCanvas.width=innerWidth;
bgCanvas.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
p.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:Math.random()*2});
}

function anim(){
c.clearRect(0,0,innerWidth,innerHeight);
p.forEach(e=>{
e.y-=0.5;
if(e.y<0)e.y=innerHeight;
c.fillStyle="white";
c.fillRect(e.x,e.y,e.s,e.s);
});
requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
